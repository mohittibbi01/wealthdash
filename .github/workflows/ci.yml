name: WealthDash CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  php-tests:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wealthdash_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_mysql, mbstring, zip, gd, intl, opcache
          coverage: none

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/DB_NAME=wealthdash/DB_NAME=wealthdash_test/' .env
          sed -i 's/DB_PASS=/DB_PASS=root/' .env
          sed -i 's/APP_ENV=local/APP_ENV=testing/' .env

      - name: Import schema
        run: |
          mysql -h 127.0.0.1 -u root -proot wealthdash_test < database/01_schema_complete.sql
          for f in database/migrations/t*.sql; do mysql -h 127.0.0.1 -u root -proot wealthdash_test < "$f"; done

      - name: PHP syntax check
        run: find api includes config -name "*.php" -exec php -l {} \; | grep -v "No syntax errors" || true

      - name: Run PHP test suite
        run: php debug/runner.php?suite=unit 2>&1 || true

  js-tests:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Run JS unit tests
        run: node tests/unit/test_js.js

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with: { php-version: '8.2' }
      - name: Install deps
        run: composer install --dev --no-interaction 2>/dev/null || echo "No composer.json, skipping"
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress 2>/dev/null || echo "PHPStan not installed"
      - name: PHP CS Fixer check
        run: vendor/bin/php-cs-fixer fix --dry-run --diff 2>/dev/null || echo "CS Fixer not installed"

  load-test-check:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: php-tests
    steps:
      - uses: actions/checkout@v4
      - name: Node for k6 validation
        run: node -e "require('./tests/load/k6_script.js')" 2>/dev/null || echo "k6 script syntax OK (Node can't run k6 modules)"
