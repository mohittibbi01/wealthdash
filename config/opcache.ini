; ============================================================
; WealthDash — tp004: PHP OPcache Configuration
; ============================================================
; XAMPP mein add karo:  C:\xampp\php\php.ini
; Linux/production mein: /etc/php/8.x/apache2/php.ini
;                   ya:  /etc/php/8.x/fpm/php.ini
; Baad mein Apache/Nginx restart karo.
;
; Check karo kya enabled hai:
;   <?php var_dump(opcache_get_status()); ?>
; ============================================================

[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=0          ; CLI scripts ko cache karne ki zaroorat nahi

; Memory — WealthDash ke 448 PHP files ke liye 128MB enough hai
opcache.memory_consumption=128

; String interning — saves memory on repeated strings
opcache.interned_strings_buffer=16

; Max files to cache — tumhara project ~500 files, 4000 enough hai
opcache.max_accelerated_files=4000

; Revalidation — dev mein 0 (always recheck), prod mein 60 (check every 60s)
; XAMPP development:
opcache.revalidate_freq=0
opcache.validate_timestamps=1

; Production (comment out above, uncomment below):
; opcache.revalidate_freq=60
; opcache.validate_timestamps=1

; JIT — PHP 8.0+ (optional, big boost for CPU-heavy code like XIRR)
; Uncomment if on PHP 8.0+:
opcache.jit_buffer_size=64M
opcache.jit=1255

; Consistency
opcache.save_comments=1       ; PHPDoc comments keep karo (needed by some libs)
opcache.fast_shutdown=1

; ── Expected speedup ──────────────────────────────────────────────────────────
; Before OPcache: Every request PHP files ko parse karta hai (~5-15ms overhead)
; After OPcache:  Compiled bytecode direct memory se — ~0.1ms
; Net: First request same, subsequent 30-70% faster depending on server
; ─────────────────────────────────────────────────────────────────────────────
