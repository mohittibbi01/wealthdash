; WealthDash — tp004: PHP OPcache Recommended Settings
; File: config/opcache.ini
;
; USAGE OPTIONS:
;   1. Copy these lines into your php.ini
;   2. Or create a file at /etc/php/8.x/fpm/conf.d/99-wealthdash-opcache.ini
;   3. Or for shared hosting — add to .user.ini in project root
;
; After changes: sudo systemctl restart php8.2-fpm
;                OR use the admin OPcache reset button

[opcache]
; Enable OPcache
opcache.enable=1
opcache.enable_cli=1

; Memory — 128MB is good for WealthDash (~40 PHP files)
opcache.memory_consumption=128

; String interning
opcache.interned_strings_buffer=16

; Max files to cache — 1000 is more than enough
opcache.max_accelerated_files=1000

; Revalidation — set to 0 in PRODUCTION (check every N seconds; 0 = never recheck)
; During DEVELOPMENT set to 1 or 2
opcache.revalidate_freq=0

; Validate timestamps — disable in PRODUCTION for max speed
; Enable in development to pick up file changes automatically
opcache.validate_timestamps=0

; JIT compilation (PHP 8.0+) — tracing mode recommended for web apps
opcache.jit=tracing
opcache.jit_buffer_size=64M

; File cache (persistent across restarts) — optional but recommended
; opcache.file_cache=/tmp/php_opcache
; opcache.file_cache_consistency_checks=0

; Huge code pages (Linux only) — optional perf gain
; opcache.huge_code_pages=1

; Save comments (required for annotations/DocBlocks if used)
opcache.save_comments=1

; Fast shutdown
opcache.fast_shutdown=1
