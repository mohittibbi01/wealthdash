version: '3.9'

services:
  app:
    build: .
    container_name: wealthdash_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_ENV: local
      APP_NAME: WealthDash
      APP_URL: http://localhost:8080
      APP_SECRET: ${APP_SECRET:-change_me_in_production}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: wealthdash
      DB_USER: wealthdash
      DB_PASS: ${DB_PASS:-wealthdash_pass}
      SESSION_LIFETIME: 86400
      SESSION_COOKIE_NAME: wd_session
      APP_TIMEZONE: Asia/Kolkata
    volumes:
      - .:/var/www/html
      - wealthdash_logs:/var/www/html/logs
      - wealthdash_storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - wealthdash_net

  db:
    image: mysql:8.0
    container_name: wealthdash_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-root_pass}
      MYSQL_DATABASE: wealthdash
      MYSQL_USER: wealthdash
      MYSQL_PASSWORD: ${DB_PASS:-wealthdash_pass}
    volumes:
      - wealthdash_db:/var/lib/mysql
      - ./database/01_schema_complete.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "wealthdash", "-pwealthdash_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wealthdash_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wealthdash_pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: wealthdash
      PMA_PASSWORD: ${DB_PASS:-wealthdash_pass}
      UPLOAD_LIMIT: 64M
    depends_on:
      - db
    networks:
      - wealthdash_net
    profiles:
      - dev

volumes:
  wealthdash_db:
  wealthdash_logs:
  wealthdash_storage:

networks:
  wealthdash_net:
    driver: bridge
